server:
  port: 8083
spring:
  application:
    name: coupons
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/
management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      enabled: true
    health:
      probes:
        enabled: true   # Enables liveness & readiness
      show-details: always

  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
info:
  app:
    name: Coupon Service
    description: Coupon microservice with actuator endpoints
    version: 1.0.0
data:
  info: default profile couponservice