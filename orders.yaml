server:
  port: 8084
spring:
  application:
    name: orders
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/
management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    shutdown:
      enabled: true
    health:
      probes:
        enabled: true   # enables liveness & readiness
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
info:
  app:
    name: Order Service
    description: Order microservice with actuator endpoints
    version: 1.0.0

data:
  info: default profile ordersservice